<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andre Vasconcelos — Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafbfe;
  --surface: #ffffff;
  --text: #1a1d2e;
  --muted: #8891a6;
  --border: #e4e8f1;
  --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; -webkit-font-smoothing: antialiased; }
.container { width: 100%; max-width: 720px; text-align: center; }

/* HEADER */
.avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #3b7ddd, #22c55e); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 34px; color: #fff; font-weight: 800; letter-spacing: -1px; box-shadow: 0 6px 24px rgba(59,125,221,0.2); }
h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 36px; }

/* CARDS */
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 24px 28px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.25s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: var(--radius) var(--radius) 0 0;
  transition: height 0.3s ease;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.1); }
.card:hover::before { height: 6px; }

.card-treino::before { background: linear-gradient(90deg, #22c55e, #16a34a); }
.card-treino:hover { border-color: #22c55e; }
.card-saude::before { background: linear-gradient(90deg, #3b7ddd, #6366f1); }
.card-saude:hover { border-color: #3b7ddd; }

.card-icon { font-size: 40px; margin-bottom: 14px; }
.card-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
.card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
.card-badge {
  display: inline-block;
  margin-top: 14px;
  padding: 4px 12px;
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-green { background: rgba(34,197,94,0.1); color: #16a34a; }
.badge-blue { background: rgba(59,125,221,0.1); color: #3b7ddd; }
.card-lock { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* FOOTER */
.footer { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
.footer a { color: var(--muted); text-decoration: none; }
.footer a:hover { color: var(--text); }

@media(max-width:520px) {
  .cards { grid-template-columns: 1fr; }
  h1 { font-size: 24px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="avatar">AV</div>
  <h1>Andre Vasconcelos</h1>
  <p class="subtitle">Hub Pessoal</p>

  <div class="cards">
    <a class="card card-treino" href="https://andrenvasc.github.io/plano-treino/">
      <div class="card-icon">🏋️</div>
      <div class="card-title">Treino & Dieta</div>
      <div class="card-desc">Plano de treino, alimentacao, suplementos e metas</div>
      <span class="card-badge badge-green">Aberto</span>
    </a>

    <a class="card card-saude" href="exames/">
      <div class="card-icon">🩺</div>
      <div class="card-title">Saude & Exames</div>
      <div class="card-desc">Historico completo de exames medicos desde 1997</div>
      <span class="card-badge badge-blue">Protegido</span>
      <div class="card-lock">🔒 Requer login</div>
    </a>
  </div>

  <div class="footer">
    <a href="https://github.com/andrenvasc" target="_blank">github.com/andrenvasc</a>
  </div>
</div>
</body>
</html>
